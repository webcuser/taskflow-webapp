{
  "services": [
    "postgres"
  ],
  "components": {
    "backend": {
      "dir": "backend",
      "run": "composer dump-autoload && cp .env.example .env && php artisan key:generate --force && php artisan migrate --force && php artisan serve --host 0.0.0.0 --port 8000",
      "port": 8000,
      "image": "php:8.2-cli",
      "setup": "apt-get update && apt-get install -y git unzip libpq-dev && docker-php-ext-install pdo pdo_pgsql && curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer && cd backend && composer install --no-interaction --prefer-dist --no-scripts --no-autoloader && cd ../frontend && npm ci && npm run build",
      "primary": true
    }
  },
  "autoPreview": true
}