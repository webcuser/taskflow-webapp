{
  "run": "php artisan serve --host 0.0.0.0 --port 8000",
  "port": 8000,
  "build": "npm run build",
  "image": "node:22-bookworm",
  "setup": "apt-get update && apt-get install -y php-cli php-mbstring php-xml php-curl php-zip php-sqlite3 unzip && curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer && composer install --no-interaction --prefer-dist && npm install",
  "services": [
    "mysql"
  ]
}
